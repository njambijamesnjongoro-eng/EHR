services:
  - type: web
    name: ehr-backend
    runtime: python
    repo: https://github.com/njambijamesnjongoro-eng/EHR
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
      - key: CORS_ALLOWED_ORIGINS
        value: https://*.vercel.app,http://localhost:3000,http://localhost:3001
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ehr-db
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: LOGIN_RATE_LIMIT
        value: 10/minute
      - key: API_RATE_LIMIT
        value: 100/minute
      - key: STORAGE_BACKEND
        value: local
      - key: AUDIT_LOG_ENABLED
        value: "True"
      - key: AUDIT_LOG_RETENTION_DAYS
        value: "365"
    healthCheckPath: /api/health/

databases:
  - name: ehr-db
    databaseName: ehr
    user: ehr_admin
    plan: free
    postgresMajorVersion: 16
